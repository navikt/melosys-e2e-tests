name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Image tags. Format: "tag" (melosys-api only) or "service1:tag1,service2:tag2" (e.g., melosys-api:e2e-logging,melosys-web:e2e-fix-1)'
        required: true
        default: 'latest'
      collect_coverage:
        description: 'Collect E2E code coverage (adds ~4 min)'
        required: false
        type: boolean
        default: false
      test_grep:
        description: 'Test filter pattern (e.g., "step-transition", "@smoke", or test file name)'
        required: false
        type: string
        default: ''
      repeat_each:
        description: 'Run each test N times (for finding race conditions)'
        required: false
        type: number
        default: 1
      disable_retries:
        description: 'Disable test retries (for accurate race condition detection)'
        required: false
        type: boolean
        default: false
      record_api:
        description: 'Record API calls during tests (for race condition analysis)'
        required: false
        type: boolean
        default: false
      test_slack_notification:
        description: '🧪 TEST: Feil umiddelbart for å trigge Slack-varsel (MIDLERTIDIG — fjernes før merge)'
        required: false
        type: boolean
        default: false

  repository_dispatch:
    types:
      - melosys-api-published
      - faktureringskomponenten-published
      - melosys-web-published
      - melosys-trygdeavgift-beregning-published
      - melosys-dokgen-published
      - melosys-trygdeavtale-published
      - melosys-inngangsvilkar-published
      - melosys-eessi-published
      - melosys-mock-published

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  e2e-tests:
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 60

    steps:
      - name: 🧪 Test Slack notification (MIDLERTIDIG — fjernes før merge)
        if: inputs.test_slack_notification == true
        run: |
          echo "🧪 Testmodus aktivert — feiler umiddelbart for å trigge notify-slack"
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm list @playwright/test --depth=0 --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers (if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install only system dependencies (if browsers were cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Login to NAIS registry
        uses: nais/login@v0
        with:
          team: teammelosys

      - name: Create Docker network
        run: |
          docker network create melosys.docker-internal || true

      - name: Determine image tags from trigger source
        id: image-tags
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # Triggered by another repository pushing an image
            echo "🔔 Triggered by repository_dispatch event"
            echo "📦 Event type: ${{ github.event.action }}"
            echo "📌 Source repository: ${{ github.event.client_payload.repository }}"
            echo "🏷️  Image tag: ${{ github.event.client_payload.image_tag }}"
            echo "📝 Commit: ${{ github.event.client_payload.commit_sha }}"
            echo "💬 Commit message: ${{ github.event.client_payload.commit_message }}"
            echo "👤 Actor: ${{ github.event.client_payload.actor }}"

            # Default all services to latest
            MELOSYS_API_TAG="latest"
            FAKTURERINGSKOMPONENTEN_TAG="latest"
            MELOSYS_WEB_TAG="latest"
            MELOSYS_TRYGDEAVGIFT_TAG="latest"
            MELOSYS_TRYGDEAVTALE_TAG="latest"
            MELOSYS_INNGANGSVILKAR_TAG="latest"
            MELOSYS_EESSI_TAG="latest"
            MELOSYS_MOCK_TAG="latest"
            MELOSYS_DOKGEN_TAG="latest"

            # Override with specific tag based on which service triggered
            if [ "${{ github.event.action }}" = "melosys-api-published" ]; then
              MELOSYS_API_TAG="${{ github.event.client_payload.image_tag }}"
            fi

            if [ "${{ github.event.action }}" = "faktureringskomponenten-published" ]; then
              FAKTURERINGSKOMPONENTEN_TAG="${{ github.event.client_payload.image_tag }}"
            fi

            if [ "${{ github.event.action }}" = "melosys-web-published" ]; then
              MELOSYS_WEB_TAG="${{ github.event.client_payload.image_tag }}"
            fi

            if [ "${{ github.event.action }}" = "melosys-trygdeavgift-beregning-published" ]; then
              MELOSYS_TRYGDEAVGIFT_TAG="${{ github.event.client_payload.image_tag }}"
            fi

            if [ "${{ github.event.action }}" = "melosys-trygdeavtale-published" ]; then
              MELOSYS_TRYGDEAVTALE_TAG="${{ github.event.client_payload.image_tag }}"
            fi

            if [ "${{ github.event.action }}" = "melosys-inngangsvilkar-published" ]; then
              MELOSYS_INNGANGSVILKAR_TAG="${{ github.event.client_payload.image_tag }}"
            fi

            if [ "${{ github.event.action }}" = "melosys-eessi-published" ]; then
              MELOSYS_EESSI_TAG="${{ github.event.client_payload.image_tag }}"
            fi

            if [ "${{ github.event.action }}" = "melosys-mock-published" ]; then
              MELOSYS_MOCK_TAG="${{ github.event.client_payload.image_tag }}"
            fi

            if [ "${{ github.event.action }}" = "melosys-dokgen-published" ]; then
              MELOSYS_DOKGEN_TAG="${{ github.event.client_payload.image_tag }}"
            fi
          else
            # Manual trigger via workflow_dispatch
            echo "👆 Manually triggered via workflow_dispatch"
            INPUT_ENV="${{ inputs.environment }}"

            # Default all services to latest
            MELOSYS_API_TAG="latest"
            FAKTURERINGSKOMPONENTEN_TAG="latest"
            MELOSYS_WEB_TAG="latest"
            MELOSYS_TRYGDEAVGIFT_TAG="latest"
            MELOSYS_TRYGDEAVTALE_TAG="latest"
            MELOSYS_INNGANGSVILKAR_TAG="latest"
            MELOSYS_EESSI_TAG="latest"
            MELOSYS_MOCK_TAG="latest"
            MELOSYS_DOKGEN_TAG="latest"

            # Check if input contains service:tag format (has colon)
            if [[ "$INPUT_ENV" == *":"* ]]; then
              echo "🏷️  Parsing multi-service tag format: $INPUT_ENV"
              # Split by comma and process each service:tag pair
              IFS=',' read -ra PAIRS <<< "$INPUT_ENV"
              for pair in "${PAIRS[@]}"; do
                # Trim whitespace
                pair=$(echo "$pair" | xargs)
                # Split by colon
                service="${pair%%:*}"
                tag="${pair#*:}"
                echo "  📦 $service -> $tag"

                case "$service" in
                  melosys-api)
                    MELOSYS_API_TAG="$tag"
                    ;;
                  melosys-web)
                    MELOSYS_WEB_TAG="$tag"
                    ;;
                  faktureringskomponenten)
                    FAKTURERINGSKOMPONENTEN_TAG="$tag"
                    ;;
                  melosys-trygdeavgift-beregning)
                    MELOSYS_TRYGDEAVGIFT_TAG="$tag"
                    ;;
                  melosys-trygdeavtale)
                    MELOSYS_TRYGDEAVTALE_TAG="$tag"
                    ;;
                  melosys-inngangsvilkar)
                    MELOSYS_INNGANGSVILKAR_TAG="$tag"
                    ;;
                  melosys-eessi)
                    MELOSYS_EESSI_TAG="$tag"
                    ;;
                  melosys-mock)
                    MELOSYS_MOCK_TAG="$tag"
                    ;;
                  melosys-dokgen)
                    MELOSYS_DOKGEN_TAG="$tag"
                    ;;
                  *)
                    echo "  ⚠️  Unknown service: $service (ignored)"
                    ;;
                esac
              done
            else
              # Simple format: just a tag for melosys-api (backwards compatible)
              echo "🏷️  Using tag for melosys-api: $INPUT_ENV"
              echo "🏷️  Using tag for other services: latest"
              MELOSYS_API_TAG="$INPUT_ENV"
            fi
          fi

          echo "melosys_api_tag=$MELOSYS_API_TAG" >> $GITHUB_OUTPUT
          echo "faktureringskomponenten_tag=$FAKTURERINGSKOMPONENTEN_TAG" >> $GITHUB_OUTPUT
          echo "melosys_web_tag=$MELOSYS_WEB_TAG" >> $GITHUB_OUTPUT
          echo "melosys_trygdeavgift_tag=$MELOSYS_TRYGDEAVGIFT_TAG" >> $GITHUB_OUTPUT
          echo "melosys_trygdeavtale_tag=$MELOSYS_TRYGDEAVTALE_TAG" >> $GITHUB_OUTPUT
          echo "melosys_inngangsvilkar_tag=$MELOSYS_INNGANGSVILKAR_TAG" >> $GITHUB_OUTPUT
          echo "melosys_eessi_tag=$MELOSYS_EESSI_TAG" >> $GITHUB_OUTPUT
          echo "melosys_mock_tag=$MELOSYS_MOCK_TAG" >> $GITHUB_OUTPUT
          echo "melosys_dokgen_tag=$MELOSYS_DOKGEN_TAG" >> $GITHUB_OUTPUT

          echo ""
          echo "📋 Docker Image Tags (non-latest only):"
          NON_LATEST_FOUND=false
          [ "$MELOSYS_API_TAG" != "latest" ] && echo "  melosys-api: $MELOSYS_API_TAG" && NON_LATEST_FOUND=true || true
          [ "$MELOSYS_WEB_TAG" != "latest" ] && echo "  melosys-web: $MELOSYS_WEB_TAG" && NON_LATEST_FOUND=true || true
          [ "$FAKTURERINGSKOMPONENTEN_TAG" != "latest" ] && echo "  faktureringskomponenten: $FAKTURERINGSKOMPONENTEN_TAG" && NON_LATEST_FOUND=true || true
          [ "$MELOSYS_TRYGDEAVGIFT_TAG" != "latest" ] && echo "  melosys-trygdeavgift-beregning: $MELOSYS_TRYGDEAVGIFT_TAG" && NON_LATEST_FOUND=true || true
          [ "$MELOSYS_TRYGDEAVTALE_TAG" != "latest" ] && echo "  melosys-trygdeavtale: $MELOSYS_TRYGDEAVTALE_TAG" && NON_LATEST_FOUND=true || true
          [ "$MELOSYS_INNGANGSVILKAR_TAG" != "latest" ] && echo "  melosys-inngangsvilkar: $MELOSYS_INNGANGSVILKAR_TAG" && NON_LATEST_FOUND=true || true
          [ "$MELOSYS_EESSI_TAG" != "latest" ] && echo "  melosys-eessi: $MELOSYS_EESSI_TAG" && NON_LATEST_FOUND=true || true
          [ "$MELOSYS_MOCK_TAG" != "latest" ] && echo "  melosys-mock: $MELOSYS_MOCK_TAG" && NON_LATEST_FOUND=true || true
          [ "$MELOSYS_DOKGEN_TAG" != "latest" ] && echo "  melosys-dokgen: $MELOSYS_DOKGEN_TAG" && NON_LATEST_FOUND=true || true
          [ "$NON_LATEST_FOUND" = false ] && echo "  (all services using latest)" || true

      - name: Set environment variables for GitHub Actions
        run: |
          echo "MELOSYS_ORACLE_DB_NAME=XEPDB1" >> $GITHUB_ENV
          echo "ORACLE_IMAGE=gvenzl/oracle-xe:18.4.0-slim" >> $GITHUB_ENV
          echo "MELOSYS_API_TAG=${{ steps.image-tags.outputs.melosys_api_tag }}" >> $GITHUB_ENV
          echo "MELOSYS_WEB_TAG=${{ steps.image-tags.outputs.melosys_web_tag }}" >> $GITHUB_ENV
          echo "FAKTURERINGSKOMPONENTEN_TAG=${{ steps.image-tags.outputs.faktureringskomponenten_tag }}" >> $GITHUB_ENV
          echo "MELOSYS_TRYGDEAVGIFT_TAG=${{ steps.image-tags.outputs.melosys_trygdeavgift_tag }}" >> $GITHUB_ENV
          echo "MELOSYS_TRYGDEAVTALE_TAG=${{ steps.image-tags.outputs.melosys_trygdeavtale_tag }}" >> $GITHUB_ENV
          echo "MELOSYS_INNGANGSVILKAR_TAG=${{ steps.image-tags.outputs.melosys_inngangsvilkar_tag }}" >> $GITHUB_ENV
          echo "MELOSYS_EESSI_TAG=${{ steps.image-tags.outputs.melosys_eessi_tag }}" >> $GITHUB_ENV
          echo "MELOSYS_MOCK_TAG=${{ steps.image-tags.outputs.melosys_mock_tag }}" >> $GITHUB_ENV
          echo "MELOSYS_DOKGEN_TAG=${{ steps.image-tags.outputs.melosys_dokgen_tag }}" >> $GITHUB_ENV

      - name: Download JaCoCo agent for E2E coverage
        if: inputs.collect_coverage
        run: |
          echo "📊 Downloading JaCoCo agent for E2E coverage collection..."
          mkdir -p jacoco
          curl -L https://repo1.maven.org/maven2/org/jacoco/jacoco/0.8.14/jacoco-0.8.14.zip -o jacoco.zip
          unzip -q jacoco.zip -d jacoco-temp
          cp jacoco-temp/lib/jacocoagent.jar jacoco/
          cp jacoco-temp/lib/jacococli.jar jacoco/
          rm -rf jacoco-temp jacoco.zip
          echo "✅ JaCoCo agent downloaded to ./jacoco/"

      - name: Checkout melosys-api for coverage report generation
        if: inputs.collect_coverage
        uses: actions/checkout@v4
        with:
          repository: navikt/melosys-api
          path: melosys-api
          token: ${{ secrets.READER_TOKEN }}

      - name: Build melosys-api for coverage class files
        if: inputs.collect_coverage
        run: |
          cd melosys-api
          echo "🔨 Building melosys-api to get compiled classes for coverage report..."
          mvn clean package -DskipTests -B --settings .github/settings.xml
          echo "✅ melosys-api compiled"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PASSWORD: ${{ secrets.READER_TOKEN }}

      - name: Pre-pull Docker images in parallel
        run: |
          echo "🐳 Pre-pulling Docker images to avoid timeout during compose up..."
          docker pull --platform linux/amd64 europe-north1-docker.pkg.dev/nais-management-233d/teammelosys/melosys-api:${{ steps.image-tags.outputs.melosys_api_tag }} &
          docker pull --platform linux/amd64 europe-north1-docker.pkg.dev/nais-management-233d/teammelosys/melosys-web:${{ steps.image-tags.outputs.melosys_web_tag }} &
          docker pull --platform linux/amd64 europe-north1-docker.pkg.dev/nais-management-233d/teammelosys/faktureringskomponenten:${{ steps.image-tags.outputs.faktureringskomponenten_tag }} &
          docker pull --platform linux/amd64 europe-north1-docker.pkg.dev/nais-management-233d/teammelosys/melosys-dokgen:${{ steps.image-tags.outputs.melosys_dokgen_tag }} &
          docker pull --platform linux/amd64 europe-north1-docker.pkg.dev/nais-management-233d/teammelosys/melosys-trygdeavgift-beregning:${{ steps.image-tags.outputs.melosys_trygdeavgift_tag }} &
          docker pull --platform linux/amd64 europe-north1-docker.pkg.dev/nais-management-233d/teammelosys/melosys-trygdeavtale:${{ steps.image-tags.outputs.melosys_trygdeavtale_tag }} &
          docker pull --platform linux/amd64 europe-north1-docker.pkg.dev/nais-management-233d/teammelosys/melosys-inngangsvilkar:${{ steps.image-tags.outputs.melosys_inngangsvilkar_tag }} &
          docker pull --platform linux/amd64 europe-north1-docker.pkg.dev/nais-management-233d/teammelosys/melosys-eessi:${{ steps.image-tags.outputs.melosys_eessi_tag }} &
          docker pull --platform linux/amd64 europe-north1-docker.pkg.dev/nais-management-233d/teammelosys/postgres-felleskodeverk-prepopulated:latest &
          docker pull --platform linux/amd64 europe-north1-docker.pkg.dev/nais-management-233d/teammelosys/felles-kodeverk:latest &
          docker pull --platform linux/amd64 europe-north1-docker.pkg.dev/nais-management-233d/teammelosys/melosys-docker-compose-mock:${{ steps.image-tags.outputs.melosys_mock_tag }} &
          docker pull --platform linux/amd64 gvenzl/oracle-xe:18.4.0-slim &
          docker pull --platform linux/amd64 postgres:13-alpine &
          docker pull --platform linux/amd64 confluentinc/cp-kafka:7.8.0 &
          docker pull --platform linux/amd64 ghcr.io/navikt/mock-oauth2-server:2.3.0 &
          docker pull --platform linux/amd64 ghcr.io/navikt/mock-oauth2-server:0.4.8 &
          docker pull --platform linux/amd64 unleashorg/unleash-server:latest &
          wait
          echo "✅ All images pre-pulled successfully"

      - name: Start Docker Compose services
        run: |
          docker compose up -d
        env:
          MELOSYS_ORACLE_DB_NAME: XEPDB1
          MELOSYS_API_TAG: ${{ steps.image-tags.outputs.melosys_api_tag }}
          MELOSYS_WEB_TAG: ${{ steps.image-tags.outputs.melosys_web_tag }}
          FAKTURERINGSKOMPONENTEN_TAG: ${{ steps.image-tags.outputs.faktureringskomponenten_tag }}
          MELOSYS_TRYGDEAVGIFT_TAG: ${{ steps.image-tags.outputs.melosys_trygdeavgift_tag }}
          MELOSYS_TRYGDEAVTALE_TAG: ${{ steps.image-tags.outputs.melosys_trygdeavtale_tag }}
          MELOSYS_INNGANGSVILKAR_TAG: ${{ steps.image-tags.outputs.melosys_inngangsvilkar_tag }}
          MELOSYS_EESSI_TAG: ${{ steps.image-tags.outputs.melosys_eessi_tag }}
          MELOSYS_MOCK_TAG: ${{ steps.image-tags.outputs.melosys_mock_tag }}
          MELOSYS_DOKGEN_TAG: ${{ steps.image-tags.outputs.melosys_dokgen_tag }}
          JACOCO_AGENT_OPTS: ${{ inputs.collect_coverage && '-javaagent:/jacoco/jacocoagent.jar=output=tcpserver,address=*,port=6300' || '' }}

      - name: Wait for services to be healthy
        run: |
          echo "⏳ Waiting for services to be ready..."

          max_attempts=20
          attempt=0

          # Function to check if a service is healthy
          check_service() {
            local service_name=$1
            local health_check=$2
            echo "Checking $service_name..."
            eval $health_check
          }

          # Wait for critical services to be ready
          while [ $attempt -lt $max_attempts ]; do
            attempt=$((attempt + 1))
            echo "⏳ Health check attempt $attempt/$max_attempts"

            # Check Oracle database health (docker health status)
            oracle_health=$(docker inspect --format='{{.State.Health.Status}}' melosys-oracle 2>/dev/null || echo "unhealthy")
            echo "  Oracle DB: $oracle_health"

            # Check Kafka health (docker health status)
            kafka_health=$(docker inspect --format='{{.State.Health.Status}}' kafka 2>/dev/null || echo "unhealthy")
            echo "  Kafka: $kafka_health"

            # Check melosys-api health endpoint
            api_health=$(curl -sf http://localhost:8080/internal/health > /dev/null 2>&1 && echo "healthy" || echo "unhealthy")
            echo "  melosys-api: $api_health"

            # Check melosys-web
            web_health=$(curl -sf http://localhost:3000/melosys/ > /dev/null 2>&1 && echo "healthy" || echo "unhealthy")
            echo "  melosys-web: $web_health"

            # Check Unleash health endpoint
            unleash_health=$(curl -sf http://localhost:4242/health > /dev/null 2>&1 && echo "healthy" || echo "unhealthy")
            echo "  unleash: $unleash_health"

            # Check melosys-eessi health endpoint
            eessi_health=$(curl -sf http://localhost:8081/internal/health > /dev/null 2>&1 && echo "healthy" || echo "unhealthy")
            echo "  melosys-eessi: $eessi_health"

            # Check if all critical services are healthy
            if [ "$oracle_health" = "healthy" ] && [ "$kafka_health" = "healthy" ] && [ "$api_health" = "healthy" ] && [ "$web_health" = "healthy" ] && [ "$unleash_health" = "healthy" ] && [ "$eessi_health" = "healthy" ]; then
              echo "✅ All critical services are healthy!"
              break
            fi

            if [ $attempt -eq $max_attempts ]; then
              echo "❌ Services failed to start within timeout"
              echo "📋 Docker compose status:"
              docker compose ps
              echo ""
              echo "📋 Docker compose logs (last 100 lines per service):"
              docker compose logs --tail=100
              exit 1
            fi

            sleep 10
          done

          echo ""
          echo "📊 Final service status:"
          docker compose ps

          # Give services a moment to fully stabilize
          echo ""
          echo "⏳ Waiting 10 seconds for services to fully stabilize..."
          sleep 10
          echo "✅ Ready to run tests!"
          echo "ℹ️  Note: Feature toggles are automatically created by melosys-api on startup"

      - name: Run Playwright tests
        id: playwright
        run: |
          # Record test start time for docker log analysis
          TEST_START_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "TEST_START_TIME=$TEST_START_TIME" >> $GITHUB_OUTPUT
          echo "⏰ Test start time: $TEST_START_TIME"

          # Build Playwright command with optional filters
          PLAYWRIGHT_CMD="npx playwright test --project=chromium"

          # Add test filter if specified
          if [ -n "${{ inputs.test_grep }}" ]; then
            echo "🔍 Filtering tests with pattern: ${{ inputs.test_grep }}"
            PLAYWRIGHT_CMD="$PLAYWRIGHT_CMD --grep '${{ inputs.test_grep }}'"
          fi

          # Add repeat count if specified (for race condition testing)
          if [ "${{ inputs.repeat_each }}" -gt 1 ]; then
            echo "🔄 Running each test ${{ inputs.repeat_each }} times"
            PLAYWRIGHT_CMD="$PLAYWRIGHT_CMD --repeat-each ${{ inputs.repeat_each }}"
          fi

          # Disable retries if specified (for accurate race condition detection)
          if [ "${{ inputs.disable_retries }}" = "true" ]; then
            echo "🚫 Retries disabled"
            PLAYWRIGHT_CMD="$PLAYWRIGHT_CMD --retries 0"
          fi

          echo "🎭 Running: $PLAYWRIGHT_CMD"

          # Run tests and capture exit code (don't fail immediately)
          eval $PLAYWRIGHT_CMD || PLAYWRIGHT_EXIT_CODE=$?

          # Check if test-summary.json was created by reporter
          if [ -f "playwright-report/test-summary.json" ]; then
            # Get CI status from reporter (excludes @known-error tests from failures)
            CI_STATUS=$(jq -r '.status' playwright-report/test-summary.json)
            echo "📊 Reporter CI status: $CI_STATUS"

            # Count test categories
            TOTAL=$(jq '.tests | length' playwright-report/test-summary.json)
            PASSED=$(jq '[.tests[] | select(.status == "passed")] | length' playwright-report/test-summary.json)
            FAILED=$(jq '[.tests[] | select(.status == "failed")] | length' playwright-report/test-summary.json)
            FLAKY=$(jq '[.tests[] | select(.status == "flaky")] | length' playwright-report/test-summary.json)
            KNOWN_ERROR_FAILED=$(jq '[.tests[] | select(.status == "known-error-failed")] | length' playwright-report/test-summary.json)
            KNOWN_ERROR_PASSED=$(jq '[.tests[] | select(.status == "known-error-passed")] | length' playwright-report/test-summary.json)

            echo ""
            echo "📋 Test Results:"
            echo "  ✅ Passed: $PASSED"
            echo "  ❌ Failed: $FAILED"
            echo "  🔄 Flaky: $FLAKY"
            echo "  ⚠️  Known Error (Failed): $KNOWN_ERROR_FAILED"
            echo "  ✨ Known Error (Passed): $KNOWN_ERROR_PASSED"
            echo "  📊 Total: $TOTAL"
            echo ""

            if [ "$CI_STATUS" = "passed" ]; then
              echo "✅ CI Status: PASSED (known-error tests don't fail the build)"
              exit 0
            else
              echo "❌ CI Status: FAILED (real test failures detected)"
              exit 1
            fi
          else
            # Fallback: use Playwright's exit code if reporter didn't run
            echo "⚠️  test-summary.json not found, using Playwright exit code"
            exit ${PLAYWRIGHT_EXIT_CODE:-1}
          fi
        env:
          CI: true
          RETRIES_DISABLED: ${{ inputs.disable_retries == true }}
          RECORD_API: ${{ inputs.record_api == true && 'true' || '' }}

      - name: Set test status outputs
        id: test-status
        if: always()
        run: |
          # Default values
          HAS_FAILURES="false"
          HAS_FLAKY="false"
          STATUS="unknown"
          
          # Check if test-summary.json exists
          if [ -f "playwright-report/test-summary.json" ]; then
            # Get status from reporter
            STATUS=$(jq -r '.status' playwright-report/test-summary.json)
            
            # Count failures and flaky tests
            FAILED=$(jq '[.tests[] | select(.status == "failed")] | length' playwright-report/test-summary.json)
            FLAKY=$(jq '[.tests[] | select(.status == "flaky")] | length' playwright-report/test-summary.json)
            
            if [ "$FAILED" -gt 0 ]; then
              HAS_FAILURES="true"
            fi
            
            if [ "$FLAKY" -gt 0 ]; then
              HAS_FLAKY="true"
            fi
          fi
          
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "has-failures=$HAS_FAILURES" >> $GITHUB_OUTPUT
          echo "has-flaky=$HAS_FLAKY" >> $GITHUB_OUTPUT
          
          echo "📊 Test status outputs:"
          echo "  status: $STATUS"
          echo "  has-failures: $HAS_FAILURES"
          echo "  has-flaky: $HAS_FLAKY"

      - name: Dump JaCoCo coverage from melosys-api
        if: always() && inputs.collect_coverage
        run: |
          echo "📊 Dumping E2E coverage data from melosys-api..."
          java -jar jacoco/jacococli.jar dump \
            --address localhost \
            --port 6300 \
            --destfile e2e-coverage.exec
          echo "✅ Coverage data dumped to e2e-coverage.exec"
          ls -lh e2e-coverage.exec

      - name: Generate E2E coverage reports
        if: always() && inputs.collect_coverage
        run: |
          echo "📈 Generating E2E coverage reports..."

          # Get absolute path to exec file
          EXEC_FILE="$(pwd)/e2e-coverage.exec"
          echo "📊 Using coverage file: $EXEC_FILE"
          ls -lh "$EXEC_FILE"

          cd melosys-api

          # Generate reports for ALL modules using Maven from root with absolute path
          echo "📊 Generating reports for all modules..."
          mvn jacoco:report -Djacoco.dataFile="$EXEC_FILE" -B

          echo "✅ Coverage reports generated"
          echo "📋 Modules with reports:"
          find . -path "*/target/site/jacoco/index.html" -type f | while read file; do
            module=$(echo "$file" | cut -d'/' -f2)
            echo "  - $module"
          done

          echo ""
          echo "📊 CSV files found:"
          find . -path "*/target/site/jacoco/jacoco.csv" -type f

      - name: E2E Coverage Report
        uses: madrapps/jacoco-report@50d3aff4548aa991e6753342d9ba291084e63848 # v1.7.2
        if: github.event_name == 'pull_request'
        with:
          paths: 'melosys-api/**/target/site/jacoco/jacoco.xml'
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 0
          title: '🎭 E2E Code Coverage'
          update-comment: true

      - name: Upload E2E coverage reports
        uses: actions/upload-artifact@v4
        if: always() && inputs.collect_coverage
        with:
          name: e2e-coverage-report
          path: |
            e2e-coverage.exec
            melosys-api/**/target/site/jacoco/
          retention-days: 30

      - name: Generate test summary
        id: summary
        if: always()
        run: |
          echo "## 🎭 Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Add trigger information if this was a repository dispatch
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            REPO="${{ github.event.client_payload.repository }}"
            COMMIT_SHA="${{ github.event.client_payload.commit_sha }}"
            COMMIT_URL="https://github.com/navikt/${REPO}/commit/${COMMIT_SHA}"

            echo "### 📦 Triggered by: [\`$REPO\`](https://github.com/navikt/$REPO)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Image tag:** \`${{ github.event.client_payload.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Commit:** [\`${COMMIT_SHA:0:7}\`]($COMMIT_URL)" >> $GITHUB_STEP_SUMMARY
            echo "- **Message:** ${{ github.event.client_payload.commit_message }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Actor:** @${{ github.event.client_payload.actor }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Use custom reporter summary if available
          if [ -f "playwright-report/test-summary.md" ]; then
            echo "📊 Using detailed test summary from custom reporter" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat playwright-report/test-summary.md >> $GITHUB_STEP_SUMMARY
          elif [ -d "test-results" ]; then
            # Fallback: Count test results from Playwright's test-results directory structure
            # Each test creates a directory like: test-name-browser/
            # Failed tests have: test-name-browser-retry1/, test-name-browser-retry2/

            # Count total tests (unique test directories, excluding retry attempts)
            TOTAL=$(find test-results -mindepth 1 -maxdepth 1 -type d | grep -v "retry" | wc -l | tr -d ' ')

            # Count failed tests (directories containing -failed- or that have retry directories)
            FAILED=$(find test-results -mindepth 1 -maxdepth 1 -type d -name "*-retry*" | sed 's/-retry[0-9]*$//' | sort -u | wc -l | tr -d ' ')

            # If no retries but we have failure indicators in directory names
            if [ "$FAILED" -eq 0 ]; then
              FAILED=$(find test-results -mindepth 1 -maxdepth 1 -type d -name "*-failed-*" 2>/dev/null | wc -l | tr -d ' ')
            fi

            PASSED=$((TOTAL - FAILED))

            echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| 📊 Total | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$FAILED" -gt 0 ]; then
              echo "### ❌ Failed Tests:" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              # List failed test names
              find test-results -mindepth 1 -maxdepth 1 -type d \( -name "*-retry*" -o -name "*-failed-*" \) | \
                sed 's/test-results\///' | \
                sed 's/-chromium.*//' | \
                sed 's/-retry[0-9]*//' | \
                sort -u | \
                while read test; do
                  echo "- $test" >> $GITHUB_STEP_SUMMARY
                done
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📦 Download the full HTML report from the artifacts below." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No test results found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          # Add docker log check results
          echo "## 🐳 Docker Log Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Checking logs from entire test run (since ${{ steps.playwright.outputs.TEST_START_TIME }})_" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # List of monitored services (same as in docker-logs.ts)
          MONITORED_SERVICES="melosys-api melosys-web melosys-mock melosys-eessi faktureringskomponenten melosys-dokgen melosys-trygdeavgift-beregning melosys-trygdeavtale melosys-inngangsvilkar"

          # Use test start time for log filtering
          SINCE_TIME="${{ steps.playwright.outputs.TEST_START_TIME }}"

          # Check all services and collect results
          TOTAL_ERRORS=0
          TOTAL_WARNINGS=0

          echo "| Service | Errors | Warnings |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|----------|" >> $GITHUB_STEP_SUMMARY

          for SERVICE in $MONITORED_SERVICES; do
            # Get logs and count errors/warnings
            # Use case-SENSITIVE grep: log levels are uppercase (ERROR, WARN), JSON keys are camelCase (errorCount)
            LOGS=$(docker logs "$SERVICE" --since "$SINCE_TIME" 2>&1 || echo "")
            ERROR_COUNT=$(echo "$LOGS" | grep -cE 'ERROR' 2>/dev/null || true)
            WARN_COUNT=$(echo "$LOGS" | grep -cE 'WARN' 2>/dev/null || true)
            # Ensure counts are valid integers (grep -c returns empty on no match with || true)
            ERROR_COUNT=${ERROR_COUNT:-0}
            WARN_COUNT=${WARN_COUNT:-0}
            # Remove any whitespace/newlines
            ERROR_COUNT=$(echo "$ERROR_COUNT" | tr -d '[:space:]')
            WARN_COUNT=$(echo "$WARN_COUNT" | tr -d '[:space:]')
            # Default to 0 if still empty
            [ -z "$ERROR_COUNT" ] && ERROR_COUNT=0
            [ -z "$WARN_COUNT" ] && WARN_COUNT=0

            if [ "$ERROR_COUNT" -gt 0 ]; then
              echo "| ❌ $SERVICE | $ERROR_COUNT | $WARN_COUNT |" >> $GITHUB_STEP_SUMMARY
            elif [ "$WARN_COUNT" -gt 0 ]; then
              echo "| ⚠️ $SERVICE | $ERROR_COUNT | $WARN_COUNT |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| ✅ $SERVICE | 0 | 0 |" >> $GITHUB_STEP_SUMMARY
            fi

            TOTAL_ERRORS=$((TOTAL_ERRORS + ERROR_COUNT))
            TOTAL_WARNINGS=$((TOTAL_WARNINGS + WARN_COUNT))
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          # Show error/warning samples grouped by service
          if [ "$TOTAL_ERRORS" -gt 0 ] || [ "$TOTAL_WARNINGS" -gt 0 ]; then
            echo "### Error/Warning Samples" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            for SERVICE in $MONITORED_SERVICES; do
              # Get logs once for this service
              SERVICE_LOGS=$(docker logs "$SERVICE" --since "$SINCE_TIME" 2>&1 || echo "")
              # Use case-SENSITIVE grep: log levels are uppercase (ERROR, WARN), JSON keys are camelCase (errorCount)
              SERVICE_ERROR_COUNT=$(echo "$SERVICE_LOGS" | grep -cE 'ERROR' 2>/dev/null || true)
              SERVICE_WARN_COUNT=$(echo "$SERVICE_LOGS" | grep -cE 'WARN' 2>/dev/null || true)
              # Ensure counts are valid integers
              SERVICE_ERROR_COUNT=$(echo "${SERVICE_ERROR_COUNT:-0}" | tr -d '[:space:]')
              SERVICE_WARN_COUNT=$(echo "${SERVICE_WARN_COUNT:-0}" | tr -d '[:space:]')
              [ -z "$SERVICE_ERROR_COUNT" ] && SERVICE_ERROR_COUNT=0
              [ -z "$SERVICE_WARN_COUNT" ] && SERVICE_WARN_COUNT=0
              SERVICE_TOTAL=$((SERVICE_ERROR_COUNT + SERVICE_WARN_COUNT))
              if [ "$SERVICE_TOTAL" -gt 0 ]; then
                echo "<details><summary>🐳 <strong>$SERVICE</strong> ($SERVICE_ERROR_COUNT errors, $SERVICE_WARN_COUNT warnings)</summary>" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                # Show unique errors grouped by type
                # 1. Match ERROR as log level (not substring)
                # 2. Clean ANSI codes
                # 3. Filter out stack traces (lines starting with whitespace + "at ", "Suppressed:", "Caused by:")
                # 4. Extract message after " - " (Spring Boot log separator: timestamp LEVEL logger - message)
                if [ "$SERVICE_ERROR_COUNT" -gt 0 ]; then
                  echo "**Errors by type:**" >> $GITHUB_STEP_SUMMARY
                  echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                  echo "$SERVICE_LOGS" | grep -E 'ERROR' | \
                    sed 's/\x1b\[[0-9;]*m//g' | sed 's/\[[0-9;]*m//g' | \
                    grep -vE '^\s+at |^\s+Suppressed:|^\s+Caused by:' | \
                    sed 's/^.* - //' | \
                    cut -c1-100 | sort | uniq -c | sort -rn | head -10 >> $GITHUB_STEP_SUMMARY
                  echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                fi
                if [ "$SERVICE_WARN_COUNT" -gt 0 ]; then
                  echo "**Warnings by type (sample):**" >> $GITHUB_STEP_SUMMARY
                  echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                  echo "$SERVICE_LOGS" | grep -E 'WARN' | \
                    sed 's/\x1b\[[0-9;]*m//g' | sed 's/\[[0-9;]*m//g' | \
                    grep -vE '^\s+at |^\s+Suppressed:|^\s+Caused by:' | \
                    sed 's/^.* - //' | \
                    cut -c1-100 | sort | uniq -c | sort -rn | head -10 >> $GITHUB_STEP_SUMMARY
                  echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                fi
                echo "</details>" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo "✅ No errors or warnings detected during test run" >> $GITHUB_STEP_SUMMARY
          fi

          # Always save docker logs for debugging (available in docker-logs artifact)
          mkdir -p docker-logs
          for SERVICE in $MONITORED_SERVICES; do
            docker logs "$SERVICE" --since "$SINCE_TIME" 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | sed 's/\[[0-9;]*m//g' > "docker-logs/${SERVICE}.log" || true
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 📥 **Download full logs:** Complete logs available in the \`docker-logs\` artifact" >> $GITHUB_STEP_SUMMARY

          if [ "$TOTAL_ERRORS" -gt 0 ]; then
            echo "DOCKER_ERRORS=true" >> $GITHUB_OUTPUT
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>📝 Recent melosys-api log activity (last 30 lines)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          docker logs melosys-api --tail 30 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | sed 's/\[[0-9;]*m//g' >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎬 Videos, traces, and screenshots are available in the artifacts." >> $GITHUB_STEP_SUMMARY

          # Add metrics coverage summary if available
          if [ -f "playwright-report/metrics-coverage.json" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 📊 Metrics Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_Process types and steps exercised by E2E tests_" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Extract summary from JSON
            CASES_CREATED=$(jq -r '.coverage.summary.sakCreated // 0' playwright-report/metrics-coverage.json)
            TREATMENTS_COMPLETED=$(jq -r '.coverage.summary.behandlingerCompleted // 0' playwright-report/metrics-coverage.json)
            PROCESS_TYPES_COUNT=$(jq -r '.coverage.processTypes.exercised | length' playwright-report/metrics-coverage.json)
            PROCESS_TYPES_PCT=$(jq -r '.coverage.processTypes.percentage | floor' playwright-report/metrics-coverage.json)
            PROCESS_STEPS_COUNT=$(jq -r '.coverage.processSteps.exercised | length' playwright-report/metrics-coverage.json)

            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Cases created | $CASES_CREATED |" >> $GITHUB_STEP_SUMMARY
            echo "| Treatments completed | $TREATMENTS_COMPLETED |" >> $GITHUB_STEP_SUMMARY
            echo "| Process types exercised | $PROCESS_TYPES_COUNT (~${PROCESS_TYPES_PCT}%) |" >> $GITHUB_STEP_SUMMARY
            echo "| Process steps exercised | $PROCESS_STEPS_COUNT |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Show process types
            echo "<details><summary>📋 Process Types (click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            jq -r '.coverage.processTypes.counts | to_entries | sort_by(-.value) | .[] | "- \(.key): \(.value)"' playwright-report/metrics-coverage.json >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Show process steps
            echo "<details><summary>📋 Process Steps (click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            jq -r '.coverage.processSteps.counts | to_entries | sort_by(-(.value.success + .value.failed)) | .[] | "- \(.key): \(.value.success) success, \(.value.failed) failed"' playwright-report/metrics-coverage.json >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

          # Add E2E coverage summary if coverage collection was enabled
          if [ "${{ inputs.collect_coverage }}" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 📊 E2E Coverage per Module" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "_Coverage collected from E2E tests exercising melosys-api_" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Module | Lines | Branches | Methods |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|----------|---------|" >> $GITHUB_STEP_SUMMARY

            total_line_covered=0
            total_line_missed=0
            total_branch_covered=0
            total_branch_missed=0
            total_method_covered=0
            total_method_missed=0

            # Find ALL modules from pom.xml files (not just those with coverage)
            cd melosys-api
            for module_pom in */pom.xml; do
              module=$(dirname "$module_pom")

              # Skip parent pom and test-only modules
              if [ "$module" = "." ] || [ "$module" = "integrasjonstest" ] || [ "$module" = "arkitektur" ]; then
                continue
              fi

              csv_file="$module/target/site/jacoco/jacoco.csv"

              if [ -f "$csv_file" ]; then
                # Module has coverage data
                line_covered=$(awk -F',' 'NR>1 {sum+=$9} END {print sum+0}' "$csv_file")
                line_missed=$(awk -F',' 'NR>1 {sum+=$8} END {print sum+0}' "$csv_file")
                branch_covered=$(awk -F',' 'NR>1 {sum+=$7} END {print sum+0}' "$csv_file")
                branch_missed=$(awk -F',' 'NR>1 {sum+=$6} END {print sum+0}' "$csv_file")
                method_covered=$(awk -F',' 'NR>1 {sum+=$13} END {print sum+0}' "$csv_file")
                method_missed=$(awk -F',' 'NR>1 {sum+=$12} END {print sum+0}' "$csv_file")

                if [ $((line_covered + line_missed)) -gt 0 ]; then
                  line_pct=$(awk "BEGIN {printf \"%.1f\", ($line_covered / ($line_covered + $line_missed)) * 100}")
                else
                  line_pct="0.0"
                fi

                if [ $((branch_covered + branch_missed)) -gt 0 ]; then
                  branch_pct=$(awk "BEGIN {printf \"%.1f\", ($branch_covered / ($branch_covered + $branch_missed)) * 100}")
                else
                  branch_pct="N/A"
                fi

                if [ $((method_covered + method_missed)) -gt 0 ]; then
                  method_pct=$(awk "BEGIN {printf \"%.1f\", ($method_covered / ($method_covered + $method_missed)) * 100}")
                else
                  method_pct="0.0"
                fi

                total_line_covered=$((total_line_covered + line_covered))
                total_line_missed=$((total_line_missed + line_missed))
                total_branch_covered=$((total_branch_covered + branch_covered))
                total_branch_missed=$((total_branch_missed + branch_missed))
                total_method_covered=$((total_method_covered + method_covered))
                total_method_missed=$((total_method_missed + method_missed))
              else
                # Module has no coverage (not touched by E2E tests)
                line_pct="0.0"
                branch_pct="0.0"
                method_pct="0.0"
              fi

              echo "| $module | ${line_pct}% | ${branch_pct}% | ${method_pct}% |" >> $GITHUB_STEP_SUMMARY
            done

            if [ $((total_line_covered + total_line_missed)) -gt 0 ]; then
              total_line_pct=$(awk "BEGIN {printf \"%.1f\", ($total_line_covered / ($total_line_covered + $total_line_missed)) * 100}")
              total_branch_pct=$(awk "BEGIN {printf \"%.1f\", ($total_branch_covered / ($total_branch_covered + $total_branch_missed)) * 100}")
              total_method_pct=$(awk "BEGIN {printf \"%.1f\", ($total_method_covered / ($total_method_covered + $total_method_missed)) * 100}")
              echo "| **TOTAL** | **${total_line_pct}%** | **${total_branch_pct}%** | **${total_method_pct}%** |" >> $GITHUB_STEP_SUMMARY
            fi

            cd ..
          fi

      - name: Capture complete docker logs
        if: always()
        run: |
          echo "📦 Capturing complete docker logs from all services..."
          mkdir -p playwright-report

          # Save complete docker logs with timestamps for all services
          services=(
            "melosys-api"
            "melosys-web"
            "melosys-mock"
            "melosys-eessi"
            "faktureringskomponenten"
            "melosys-dokgen"
            "melosys-trygdeavgift-beregning"
            "melosys-trygdeavtale"
            "melosys-inngangsvilkar"
          )

          for service in "${services[@]}"; do
            echo "📝 Capturing logs from $service..."
            docker logs "$service" --timestamps 2>&1 > "playwright-report/${service}-complete.log" || echo "⚠️  Failed to capture $service logs"
          done

          # List all docker log files created
          echo ""
          echo "📋 Complete docker log files in playwright-report/:"
          ls -lh playwright-report/*-complete.log 2>/dev/null || echo "No complete log files found"
          echo ""
          echo "📋 Per-test docker log files:"
          ls -lh playwright-report/docker-logs-* 2>/dev/null || echo "No per-test log files found"

      - name: Upload test results and reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Upload test summary and metrics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-summary
          path: |
            playwright-report/test-summary.md
            playwright-report/test-summary.json
            playwright-report/metrics-summary.md
            playwright-report/metrics-coverage.json
            playwright-report/recordings/
          retention-days: 30

      - name: Upload docker logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docker-logs
          path: docker-logs/
          retention-days: 7

      - name: Upload test videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-videos
          path: test-results/**/video.webm
          retention-days: 7

      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/**/trace.zip
          retention-days: 7

      - name: Show docker logs on failure
        if: failure()
        run: |
          echo "📋 Docker compose logs:"
          docker compose logs --tail=100

      - name: Stop Docker Compose services
        if: always()
        run: |
          docker compose down -v
          docker network rm melosys.docker-internal || true

  notify-slack:
    name: Notify #melosys-ci on failure
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: failure() && (github.event_name == 'repository_dispatch' || inputs.test_slack_notification == true)
    env:
      SLACK_USER_MAPPING: ${{ secrets.SLACK_USER_MAPPING }}
    steps:
      - name: Download test-summary artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: test-summary
          path: test-summary

      - name: Build Slack context
        id: ctx
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            ACTOR='${{ github.event.client_payload.actor }}'
            SOURCE_REPO='${{ github.event.client_payload.repository }}'
            COMMIT_SHA='${{ github.event.client_payload.commit_sha }}'
            COMMIT_MSG='${{ github.event.client_payload.commit_message }}'
            IMAGE_TAG='${{ github.event.client_payload.image_tag }}'
          else
            # Testmodus (workflow_dispatch) — bruk github-context som fallback
            ACTOR='${{ github.actor }}'
            SOURCE_REPO='melosys-e2e-tests (TEST)'
            COMMIT_SHA='${{ github.sha }}'
            COMMIT_MSG='🧪 Test av Slack-varsling — ignorer'
            IMAGE_TAG='test'
          fi
          SHORT_SHA="${COMMIT_SHA:0:7}"

          # Mention: Slack-ID (U...) gir ekte ping, handle (rune.lind) gir synlig tekst.
          # Mapping kommer fra org-secret SLACK_USER_MAPPING (JSON-streng).
          SLACK_VAL=""
          if [ -n "$ACTOR" ] && [ -n "${SLACK_USER_MAPPING:-}" ]; then
            SLACK_VAL=$(printf '%s' "$SLACK_USER_MAPPING" | jq -r --arg a "$ACTOR" '.[$a] // ""')
          fi
          if [[ "$SLACK_VAL" =~ ^U[A-Z0-9]+$ ]]; then
            MENTION="<@${SLACK_VAL}>"
          elif [ -n "$SLACK_VAL" ]; then
            MENTION="@${SLACK_VAL}"
          elif [ -n "$ACTOR" ]; then
            MENTION="@${ACTOR}"
          else
            MENTION=""
          fi

          # Testresultater fra test-summary.json
          RESULTS_BLOCK=""
          SUMMARY_JSON="test-summary/test-summary.json"
          if [ -f "$SUMMARY_JSON" ]; then
            PASSED=$(jq '[.tests[] | select(.status == "passed" and .totalAttempts == 1)] | length' "$SUMMARY_JSON")
            FAILED=$(jq '[.tests[] | select(.status == "failed" and (.isKnownError | not))] | length' "$SUMMARY_JSON")
            FLAKY=$(jq '[.tests[] | select(.status == "passed" and .totalAttempts > 1)] | length' "$SUMMARY_JSON")
            SKIPPED=$(jq '[.tests[] | select(.status == "skipped")] | length' "$SUMMARY_JSON")
            KNOWN_FAILED=$(jq '[.tests[] | select(.status == "failed" and .isKnownError)] | length' "$SUMMARY_JSON")
            TOTAL=$(jq '.tests | length' "$SUMMARY_JSON")

            RESULTS_BLOCK="*Resultater:* ✅ ${PASSED} passed · ❌ ${FAILED} failed · 🔄 ${FLAKY} flaky · ⏭️ ${SKIPPED} skipped"
            if [ "$KNOWN_FAILED" -gt 0 ]; then
              RESULTS_BLOCK="${RESULTS_BLOCK} · ⚠️ ${KNOWN_FAILED} known-error"
            fi
            RESULTS_BLOCK="${RESULTS_BLOCK} (av ${TOTAL} totalt)"

            # Liste opp feilede tester (ikke known-errors), maks 5
            FAILED_LIST=$(jq -r '
              [.tests[] | select(.status == "failed" and (.isKnownError | not)) | .title]
              | .[0:5]
              | map("• " + .)
              | join("\n")
            ' "$SUMMARY_JSON")
            if [ -n "$FAILED_LIST" ] && [ "$FAILED_LIST" != "" ]; then
              RESULTS_BLOCK="${RESULTS_BLOCK}\n\n*Feilede tester:*\n${FAILED_LIST}"
              if [ "$FAILED" -gt 5 ]; then
                EXTRA=$((FAILED - 5))
                RESULTS_BLOCK="${RESULTS_BLOCK}\n_... og ${EXTRA} til_"
              fi
            fi

            # Flaky-tester (passed etter retry), maks 3
            FLAKY_LIST=$(jq -r '
              [.tests[] | select(.status == "passed" and .totalAttempts > 1) | .title]
              | .[0:3]
              | map("• " + .)
              | join("\n")
            ' "$SUMMARY_JSON")
            if [ -n "$FLAKY_LIST" ] && [ "$FLAKY_LIST" != "" ]; then
              RESULTS_BLOCK="${RESULTS_BLOCK}\n\n*Flaky (passed etter retry):*\n${FLAKY_LIST}"
            fi
          else
            RESULTS_BLOCK="_Testresultater ikke tilgjengelig (test-summary.json mangler)._"
          fi

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMIT_URL="https://github.com/navikt/${SOURCE_REPO}/commit/${COMMIT_SHA}"
          REPO_URL="https://github.com/navikt/${SOURCE_REPO}"

          MESSAGE="${MENTION} E2E-tester feilet etter image-push fra ${SOURCE_REPO}.\n\n"
          MESSAGE="${MESSAGE}*Repo:* <${REPO_URL}|${SOURCE_REPO}>\n"
          MESSAGE="${MESSAGE}*Commit:* <${COMMIT_URL}|\`${SHORT_SHA}\`> — ${COMMIT_MSG}\n"
          MESSAGE="${MESSAGE}*Image tag:* \`${IMAGE_TAG}\`\n\n"
          MESSAGE="${MESSAGE}${RESULTS_BLOCK}\n\n"
          MESSAGE="${MESSAGE}*Workflow run:* <${RUN_URL}|#${{ github.run_id }}>"

          {
            echo 'SLACK_MESSAGE<<SLACK_EOF'
            printf '%b' "$MESSAGE"
            echo
            echo 'SLACK_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_USERNAME: Github Actions
          SLACK_ICON: https://github.com/github.png?size=48
          SLACK_COLOR: danger
          SLACK_TITLE: "E2E-tester feilet"
          SLACK_FOOTER: "melosys-e2e-tests"
          SLACK_MESSAGE: ${{ steps.ctx.outputs.SLACK_MESSAGE }}
          MSG_MINIMAL: "true"
